name: Deploy to GitHub Pages

on:
  # Trigger the workflow every time you push to the production branch.
  push:
    branches: [ master ]
  # Allows you to run this workflow manually from the Actions tab on GitHub.
  workflow_dispatch:

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      - name: Install, build, and prepare site with Astro
        uses: withastro/action@v3
        with:
          node-version: 24
          package-manager: npm
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          # adjust this path if your Astro output directory is different
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          # 1 hour timeout (milliseconds). Increase if needed during peak times.
          timeout: 3600000